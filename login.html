<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OK Varanasi Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif}
:root{--bg:#060e1a;--text:#f4f6f9;--muted:#8a95ac;--cyan:#00f2fe;--saffron:#ff6b08}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
body:before{content:'';position:absolute;top:-150px;right:-100px;width:400px;height:400px;background:var(--cyan);opacity:.12;filter:blur(150px)}
body:after{content:'';position:absolute;bottom:-150px;left:-100px;width:350px;height:350px;background:var(--saffron);opacity:.12;filter:blur(150px)}
.header{position:absolute;top:0;left:0;width:100%;padding:20px 5%}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.logo-ok{font-size:2rem;font-weight:800}.logo-varanasi{display:flex;flex-direction:column;color:var(--cyan);font-weight:800;border-left:2px solid var(--saffron);padding-left:10px}.logo-varanasi span{font-size:.65rem;color:var(--saffron)}
.wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{width:420px;max-width:100%;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);padding:40px;border-radius:24px;border:1px solid rgba(255,255,255,.08)}
h1{font-family:'Marcellus',serif;text-align:center}p{text-align:center;color:var(--muted);margin:8px 0 25px}
.input{display:flex;align-items:center;gap:12px;background:#0f1d31;padding:15px;border-radius:14px;margin-bottom:16px}
.input i{color:var(--cyan)}.input input{flex:1;background:none;border:none;outline:none;color:#fff}
button{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--saffron),var(--cyan));font-weight:700;cursor:pointer}
.links{display:flex;justify-content:space-between;margin-top:15px}.links a,.bottom a{color:var(--cyan);text-decoration:none}.bottom{text-align:center;margin-top:20px;color:var(--muted)}
</style>
</head>
<body>
<header class="header">
<a href="index.html" class="logo"><div class="logo-ok">OK</div><div class="logo-varanasi">VARANASI<span>City of Light</span></div></a>
</header>

<section class="wrap">
<div class="card">
<h1>Welcome Back</h1>
<p>Login to continue your journey</p>

<form id="loginForm" action="api/login.php" method="POST">
<div class="input"><i class="fa-solid fa-envelope"></i><input type="email" name="email" placeholder="Email Address" required></div>
<div class="input"><i class="fa-solid fa-lock"></i><input type="password" name="password" placeholder="Password" required></div>

<button type="submit">Login</button>

<div class="links">
<a href="forgot-password.html">Forgot Password?</a>
<a href="index.html">Home</a>
</div>
</form>

<div class="bottom">
Don't have an account?
<a href="register.html">Create Account</a>
</div>
</div>
</section>

<script>
const loginForm=document.getElementById("loginForm");
loginForm.addEventListener("submit",function(e){
e.preventDefault();
const formData=new FormData(loginForm);
fetch("api/login.php",{method:"POST",body:formData})
.then(r=>r.text())
.then(data=>{
if(data.trim()==="success"){
alert("Login Successful!");
window.location.href="index.html";
}else{
alert(data);
}
})
.catch(()=>alert("Something went wrong."));
});
</script>
</body>
</html>
