<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | OK Varanasi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
}

:root{
--bg:#060e1a;
--text:#f4f6f9;
--muted:#8a95ac;
--cyan:#00f2fe;
--saffron:#ff6b08;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
top:-150px;
right:-100px;
width:400px;
height:400px;
background:var(--cyan);
opacity:.12;
filter:blur(150px);
}

body::after{
content:"";
position:absolute;
bottom:-150px;
left:-100px;
width:350px;
height:350px;
background:var(--saffron);
opacity:.12;
filter:blur(150px);
}

.header{
position:absolute;
top:0;
left:0;
width:100%;
padding:20px 5%;
}

.logo{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
}

.logo-ok{
font-size:2rem;
font-weight:800;
}

.logo-varanasi{
display:flex;
flex-direction:column;
color:var(--cyan);
font-weight:800;
border-left:2px solid var(--saffron);
padding-left:10px;
}

.logo-varanasi span{
font-size:.65rem;
color:var(--saffron);
}

.wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{

width:430px;
max-width:100%;

background:rgba(255,255,255,.04);

backdrop-filter:blur(20px);

border-radius:24px;

padding:40px;

border:1px solid rgba(255,255,255,.08);

}

.title{

font-family:'Marcellus',serif;

font-size:2rem;

text-align:center;

}

.subtitle{

text-align:center;

color:var(--muted);

margin:10px 0 25px;

}

.input{

display:flex;

align-items:center;

gap:12px;

background:#0f1d31;

padding:15px;

border-radius:14px;

margin-bottom:16px;

}

.input i{

color:var(--cyan);

}

.input input{

width:100%;

background:none;

border:none;

outline:none;

color:white;

font-size:15px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:700;

cursor:pointer;

background:linear-gradient(
135deg,
var(--saffron),
var(--cyan)
);

color:white;

}

.bottom{

text-align:center;

margin-top:20px;

}

.bottom a{

color:var(--cyan);

text-decoration:none;

}

</style>

</head>

<body>

<header class="header">

<a href="index.html" class="logo">

<div class="logo-ok">

OK

</div>

<div class="logo-varanasi">

VARANASI

<span>City of Light</span>

</div>

</a>

</header>

<section class="wrapper">

<div class="card">

<h1 class="title">

Reset Password

</h1>

<p class="subtitle">

Create your new password

</p>

<form id="resetForm"
action="api/reset-password.php"
method="POST">

<input
type="hidden"
name="token"
id="token">

<div class="input">

<i class="fa-solid fa-lock"></i>

<input
type="password"
name="password"
placeholder="New Password"
required>

</div>

<div class="input">

<i class="fa-solid fa-lock"></i>

<input
type="password"
name="confirm_password"
placeholder="Confirm Password"
required>

</div>

<button type="submit">

Reset Password

</button>

</form>

<div class="bottom">

<a href="login.html">

<i class="fa-solid fa-arrow-left"></i>

Back to Login

</a>

</div>

</div>

</section>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("token").value = params.get("token");

const resetForm=document.getElementById("resetForm");

resetForm.addEventListener("submit",function(e){

e.preventDefault();

const formData=new FormData(resetForm);

fetch("api/reset-password.php",{

method:"POST",

body:formData

})

.then(response=>response.text())

.then(data=>{

if(data.trim()=="success"){

alert("Password Updated Successfully!");

window.location.href="login.html";

}

else{

alert(data);

}

})

.catch(()=>{

alert("Something went wrong.");

});

});

</script>

</body>

</html>
